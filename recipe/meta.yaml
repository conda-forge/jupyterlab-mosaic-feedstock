{% set name = "jupyterlab-mosaic" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/jupyterlab_mosaic-{{ version }}.tar.gz
  sha256: a6469d8e0b400d93d9761f2dbcb844f39b941c5b4c427b9bb5abe8ec618a2aff

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - jupyter-packaging
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}

test:
  imports:
    - jupyterlab_mosaic
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/NyanCAD/jupyterlab-mosaic
  summary: Mosaic schematic editor lab extension
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - pepijndevos
